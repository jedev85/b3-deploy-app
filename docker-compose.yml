services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://deploylab:deploylab@database:5432/deploylab?serverVersion=16&charset=utf8
    depends_on:
      database:
        condition: service_healthy
    command: sh -lc "composer install && php -S 0.0.0.0:8000 -t public"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deploylab
      POSTGRES_USER: deploylab
      POSTGRES_PASSWORD: deploylab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploylab -d deploylab"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
