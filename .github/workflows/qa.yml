name: QA

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    qa:
        name: Static analysis and tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_DB: deploylab
                    POSTGRES_USER: deploylab
                    POSTGRES_PASSWORD: deploylab
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U deploylab -d deploylab"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            APP_ENV: test
            APP_SECRET: test-secret
            DATABASE_URL: postgresql://deploylab:deploylab@127.0.0.1:5432/deploylab?serverVersion=16&charset=utf8
            DEFAULT_URI: http://localhost
            SHELL_VERBOSITY: -1

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: ctype, iconv, intl, mbstring, pdo_pgsql, xml, zip
                  coverage: none
                  tools: composer:v2

            - name: Validate Composer
              run: composer validate --strict

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Lint configuration and templates
              run: |
                  php bin/console lint:yaml config
                  php bin/console lint:twig templates
                  php bin/console lint:container

            - name: Prepare test database
              run: |
                  php bin/console doctrine:database:create --if-not-exists --env=test
                  php bin/console doctrine:migrations:migrate --no-interaction --env=test
                  php bin/console doctrine:fixtures:load --no-interaction --env=test

            - name: Static analysis
              run: composer qa

            - name: Tests
              run: composer test
